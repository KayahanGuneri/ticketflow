name: ticketflow

services:
  postgres:
    image: postgres:16
    container_name: ticketflow-postgres
    environment:
      POSTGRES_DB: ticketflow
      POSTGRES_USER: ticketflow
      POSTGRES_PASSWORD: ticketflow
    ports:
      - "5435:5432"
    volumes:
      - ticketflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketflow -d ticketflow"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ticketflow_postgres_data:
